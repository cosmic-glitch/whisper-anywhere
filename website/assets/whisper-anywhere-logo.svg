<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Draft 04 V4A: Green Whisper Anywhere Pipeline</title>
  <desc id="desc">Three-stage dictation pipeline in the production green theme with Whisper Anywhere wordmark.</desc>
  <defs>
