      <stop offset="0%" stop-color="#1a4f48"/>
      <stop offset="100%" stop-color="#123d36"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9effeb"/>
      <stop offset="100%" stop-color="#64f1d7"/>
