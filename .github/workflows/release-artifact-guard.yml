name: Release Artifact Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  enforce-full-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate artifact policy
        shell: bash
        run: |
          set -euo pipefail

          LEGACY_UNSIGNED_DIST_DMG="dist/Whisper-Anywhere-unsigned.dmg"
          LEGACY_UNSIGNED_WEB_DMG="website/downloads/Whisper-Anywhere-unsigned.dmg"
          VERSIONED_WEB_DMG_REGEX='^website/downloads/Whisper-Anywhere-[0-9]+\.[0-9]+\.[0-9]+\.dmg$'

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          if [[ "$BASE_SHA" =~ ^0+$ ]]; then
            CHANGED="$(git diff --name-only "$(git hash-object -t tree /dev/null)" "$HEAD_SHA")"
          else
            CHANGED="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
          fi

          RELEASE_REQUIRED=0
          LEGACY_UNSIGNED_CHANGED=0
          VERSIONED_WEB_DMG_CHANGED=""

          while IFS= read -r path; do
            [[ -z "$path" ]] && continue

            case "$path" in
              WhisperAnywhere/*|WhisperAnywhereTests/*|Package.swift)
                RELEASE_REQUIRED=1
                ;;
            esac

            case "$path" in
              "$LEGACY_UNSIGNED_DIST_DMG"|"$LEGACY_UNSIGNED_WEB_DMG")
                LEGACY_UNSIGNED_CHANGED=1
                ;;
            esac

            if [[ "$path" =~ $VERSIONED_WEB_DMG_REGEX ]]; then
              VERSIONED_WEB_DMG_CHANGED+="${path}"$'\n'
            fi
          done <<< "$CHANGED"

          if [[ "$RELEASE_REQUIRED" -eq 0 ]]; then
            echo "No app/runtime changes detected."
            exit 0
          fi

          if [[ "$LEGACY_UNSIGNED_CHANGED" -eq 1 ]]; then
            echo "Legacy unsigned DMG paths are no longer supported."
            echo "Use ./scripts/build-prod to create a versioned DMG in website/downloads."
            exit 1
          fi

          VERSIONED_WEB_DMGS="$(printf '%s' "$VERSIONED_WEB_DMG_CHANGED" | sed '/^$/d' | sort -u)"
          VERSIONED_WEB_DMG_COUNT="$(printf '%s\n' "$VERSIONED_WEB_DMGS" | sed '/^$/d' | wc -l | tr -d ' ')"

          if [[ "$VERSIONED_WEB_DMG_COUNT" -ne 1 ]]; then
            echo "App/runtime changes detected, but exactly one versioned website DMG was not updated."
            echo "Expected one changed file matching:"
            echo "  - website/downloads/Whisper-Anywhere-x.y.z.dmg"
            echo "Found $VERSIONED_WEB_DMG_COUNT matching files."
            exit 1
          fi

          WEB_DMG="$(printf '%s\n' "$VERSIONED_WEB_DMGS" | head -n 1)"
          WEB_BLOB="$(git rev-parse "$HEAD_SHA:$WEB_DMG" 2>/dev/null || true)"

          if [[ -z "$WEB_BLOB" ]]; then
            echo "Required DMG file missing at HEAD: $WEB_DMG"
            exit 1
          fi

          echo "Release artifact policy passed for $WEB_DMG."
